services:
  - type: web
    name: nutrisync-backend
    env: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: nutrisync-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EDAMAM_RECIPE_APP_ID
        sync: false
      - key: EDAMAM_RECIPE_APP_KEY
        sync: false
      - key: EDAMAM_FOOD_APP_ID
        sync: false
      - key: EDAMAM_FOOD_APP_KEY
        sync: false
      - key: EDAMAM_BASE_URL
        value: https://api.edamam.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: nutrisync-voice-notes
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: nutrisync-db
    plan: free